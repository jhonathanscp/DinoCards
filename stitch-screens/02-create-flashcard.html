<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Settings</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#3b82f6",
                        "background-light": "#f1f5f9",
                        "background-dark": "#0f172a",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1e293b",
                        "text-light": "#334155",
                        "text-dark": "#cbd5e1",
                        "border-light": "#e2e8f0",
                        "border-dark": "#334155",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                    },
                },
            },
        };
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-text-light dark:text-text-dark min-h-screen flex flex-col antialiased">
<header class="bg-surface-light dark:bg-surface-dark border-b border-border-light dark:border-border-dark px-4 py-3 flex items-center justify-center sticky top-0 z-10">
<h1 class="text-lg font-semibold text-slate-900 dark:text-white">Settings</h1>
</header>
<main class="flex-1 overflow-y-auto pb-6 sm:max-w-2xl sm:mx-auto w-full">
<div class="mt-6 px-4 py-2 text-xs font-semibold text-slate-500 uppercase tracking-wider">Account</div>
<div class="bg-surface-light dark:bg-surface-dark border-t border-b sm:border border-border-light dark:border-border-dark sm:rounded-lg">
<div class="flex items-center justify-between p-4 border-b border-border-light dark:border-border-dark">
<span class="text-base text-slate-900 dark:text-white">Email</span>
<span class="text-base text-slate-500">user@example.com</span>
</div>
<div class="flex items-center justify-between p-4">
<span class="text-base text-slate-900 dark:text-white">Sync Status</span>
<span class="text-base text-emerald-500 font-medium">Up to date</span>
</div>
</div>
<div class="mt-8 px-4 py-2 text-xs font-semibold text-slate-500 uppercase tracking-wider">Study</div>
<div class="bg-surface-light dark:bg-surface-dark border-t border-b sm:border border-border-light dark:border-border-dark sm:rounded-lg">
<div class="flex items-center justify-between p-4 border-b border-border-light dark:border-border-dark cursor-pointer active:bg-slate-50 dark:active:bg-slate-800 transition-colors">
<span class="text-base text-slate-900 dark:text-white">New cards per day</span>
<div class="flex items-center text-slate-500">
<span class="text-base mr-1">20</span>
<span class="material-symbols-outlined text-xl">chevron_right</span>
</div>
</div>
<div class="flex items-center justify-between p-4 border-b border-border-light dark:border-border-dark cursor-pointer active:bg-slate-50 dark:active:bg-slate-800 transition-colors">
<span class="text-base text-slate-900 dark:text-white">Maximum reviews/day</span>
<div class="flex items-center text-slate-500">
<span class="text-base mr-1">200</span>
<span class="material-symbols-outlined text-xl">chevron_right</span>
</div>
</div>
<div class="flex items-center justify-between p-4 cursor-pointer active:bg-slate-50 dark:active:bg-slate-800 transition-colors">
<span class="text-base text-slate-900 dark:text-white">SRS Algorithm</span>
<div class="flex items-center text-slate-500">
<span class="text-base mr-1">FSRS v4</span>
<span class="material-symbols-outlined text-xl">chevron_right</span>
</div>
</div>
</div>
<div class="mt-8 px-4 py-2 text-xs font-semibold text-slate-500 uppercase tracking-wider">Appearance</div>
<div class="bg-surface-light dark:bg-surface-dark border-t border-b sm:border border-border-light dark:border-border-dark sm:rounded-lg">
<div class="flex items-center justify-between p-4">
<span class="text-base text-slate-900 dark:text-white">Dark Mode</span>
<div class="w-12 h-7 bg-primary rounded-full relative cursor-pointer shadow-inner">
<div class="absolute right-1 top-1 w-5 h-5 bg-white rounded-full shadow-sm transition-transform"></div>
</div>
</div>
</div>
<div class="mt-10 px-4 flex flex-col items-center">
<button class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-xl shadow-sm text-base font-semibold text-white bg-primary hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors" type="button">
            Force Sync
        </button>
<p class="mt-3 text-sm text-slate-500">Last synced: 2 minutes ago</p>
</div>
</main>
<nav class="bg-surface-light dark:bg-surface-dark border-t border-border-light dark:border-border-dark pb-safe mt-auto">
<div class="flex justify-around items-center h-16 px-2">
<button class="flex flex-col items-center justify-center w-full h-full text-slate-400 hover:text-slate-600 dark:hover:text-slate-300">
<span class="material-symbols-outlined text-2xl">style</span>
<span class="text-[10px] mt-1 font-medium">Decks</span>
</button>
<button class="flex flex-col items-center justify-center w-full h-full text-slate-400 hover:text-slate-600 dark:hover:text-slate-300">
<span class="material-symbols-outlined text-2xl">add_circle</span>
<span class="text-[10px] mt-1 font-medium">Add</span>
</button>
<button class="flex flex-col items-center justify-center w-full h-full text-slate-400 hover:text-slate-600 dark:hover:text-slate-300">
<span class="material-symbols-outlined text-2xl">search</span>
<span class="text-[10px] mt-1 font-medium">Browse</span>
</button>
<button class="flex flex-col items-center justify-center w-full h-full text-slate-400 hover:text-slate-600 dark:hover:text-slate-300">
<span class="material-symbols-outlined text-2xl">bar_chart</span>
<span class="text-[10px] mt-1 font-medium">Stats</span>
</button>
<button class="flex flex-col items-center justify-center w-full h-full text-slate-400 hover:text-slate-600 dark:hover:text-slate-300">
<span class="material-symbols-outlined text-2xl">sync</span>
<span class="text-[10px] mt-1 font-medium">Sync</span>
</button>
<button class="flex flex-col items-center justify-center w-full h-full text-primary">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1">settings</span>
<span class="text-[10px] mt-1 font-medium">Settings</span>
</button>
</div>
</nav>
</body></html>
